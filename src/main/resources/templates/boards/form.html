<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Create Board Post</title>
</head>
<body>
<section>
    <header class="page-header">
        <h1>Create a New Post</h1>
        <a class="button secondary" th:href="@{/boards}">Back to List</a>
    </header>

    <div th:if="${boardCreated}" class="alert">
        A post was created successfully. ID <span th:text="${boardPostId}"></span>
    </div>

    <div class="alert info" th:if="${currentUser != null}">
        Signed in as <strong th:text="${currentUser.username()}">user</strong>
    </div>

    <form th:action="@{/boards}" th:object="${boardPostCreateRequest}" method="post">
        <div class="field">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" maxlength="200" required>
            <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</div>
        </div>
        <div class="field">
            <label for="content">Content</label>
            <textarea id="content" rows="8" th:field="*{content}" required></textarea>
            <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">Content error</div>
        </div>
        <button type="submit" class="button">Create</button>
    </form>
</section>
</body>
</html>
